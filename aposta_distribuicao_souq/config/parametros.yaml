# Premissas gerais do app (editáveis na aba Configurações).
aproveitamento: 0.70
reserva_cd_pct: 0.20

# Fim do período saudável da coleção — define o horizonte da projeção.
# VERÃO YYYY-YYYY+1 encerra em 02/01 do ano seguinte; INVERNO YYYY, em 14/06.
fim_periodo_verao: 02/01
fim_periodo_inverno: 14/06

# Tetos da distribuição inicial.
cobertura_maxima_semanas: 6   # nunca mais que 6 semanas da velocidade da loja
max_por_tamanho_loja: 4       # nunca mais que 4 peças do mesmo SKU-tamanho por loja

# Escopo e sazonalidade.
min_amostra_curva: 800
desde_colecao: 2022.0

# Espelho sem data de liquidacao: se vendeu nos ultimos N dias, considera-se que
# ainda esta a full price e a janela vai ate hoje (97% da safra corrente vendeu
# nos ultimos 60 dias). Quem parou antes disso saiu de circulacao sem registro:
# a janela para na ultima venda, para nao diluir a velocidade em anos de prateleira.
dias_para_considerar_ativo: 60
